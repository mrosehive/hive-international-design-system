<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:28px 32px; }
  .tag { font-size:10px; font-weight:var(--weight-semibold); letter-spacing:var(--tracking-label); text-transform:uppercase; color:var(--text-accent); margin-bottom:14px; }
  .display { font-family:var(--font-display); font-size:76px; line-height:0.95; letter-spacing:var(--tracking-display); color:var(--text-strong); }
  .display .gold { color:var(--hive-gold); }
  .sub { font-family:var(--font-display); font-size:24px; letter-spacing:var(--tracking-title); color:var(--text-muted); margin-top:10px; }
</style>
</head>
<body>
  <div class="tag">Display / Headlines — Bebas Neue</div>
  <div class="display">ADVISORY DEPTH.<br><span class="gold">OPERATIONAL RESULTS.</span></div>
  <div class="sub">Field-tested expertise · Globally engaged</div>
</body>
</html>
