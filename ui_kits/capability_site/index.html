<!-- @dsCard group="Capability Site" viewport="1280x760" name="Capability Website" subtitle="Hero, capabilities, by-the-numbers & contract footer" -->
<!-- @startingPoint section="Screens" subtitle="Full capability marketing site" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hive International — Capability Site</title>
<link rel="icon" href="../../assets/favicon/favicon.ico">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--surface-base); }
  * { box-sizing: border-box; }
  a { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>

  <script type="text/babel" src="SiteNav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Capabilities.jsx"></script>
  <script type="text/babel" src="Numbers.jsx"></script>
  <script type="text/babel" src="ContactFooter.jsx"></script>
  <script type="text/babel" src="Overlays.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      const [cap, setCap] = React.useState(null);
      const [briefing, setBriefing] = React.useState(false);
      const [filter, setFilter] = React.useState('All');
      return (
        <React.Fragment>
          <window.SiteNav onRequest={() => setBriefing(true)} />
          <window.Hero onRequest={() => setBriefing(true)} />
          <window.Capabilities onSelect={setCap} activeTag={filter} onFilter={setFilter} />
          <window.Numbers />
          <window.ContactFooter />
          <window.CapabilityModal cap={cap} onClose={() => setCap(null)} />
          <window.BriefingModal open={briefing} onClose={() => setBriefing(false)} />
        </React.Fragment>
      );
    }

    function mount() {
      if (!window.SiteNav || !window.Hero || !window.Capabilities || !window.Numbers || !window.ContactFooter || !window.CapabilityModal) {
        return setTimeout(mount, 30);
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    }
    mount();
  </script>
</body>
</html>
