<!-- @dsCard group="Colors" viewport="700x150" name="Gold Discipline" subtitle="Gold tints + the restraint rule that governs them" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:24px; display:flex; gap:24px; align-items:stretch; }
  .swatches { display:flex; gap:10px; flex:0 0 auto; }
  .sw { width:96px; }
  .chip { height:60px; border-radius:var(--radius-sm); border:1px solid var(--border-hairline); }
  .hex { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-top:6px; }
  .lbl { font-size:10px; color:var(--text-muted); margin-top:2px; }
  .note { flex:1; border-left:var(--border-accent-w) solid var(--hive-gold); padding:4px 0 4px 16px; align-self:center; }
  .note p { margin:0; font-size:12.5px; color:var(--text-muted); line-height:1.6; }
  .note strong { color:var(--text-strong); font-weight:var(--weight-semibold); }
</style>
</head>
<body>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#F7C95A"></div><div class="hex">#F7C95A</div><div class="lbl">Bright / hover</div></div>
    <div class="sw"><div class="chip" style="background:#F2B632"></div><div class="hex">#F2B632</div><div class="lbl">Gold (base)</div></div>
    <div class="sw"><div class="chip" style="background:#D99A1C"></div><div class="hex">#D99A1C</div><div class="lbl">Deep / pressed</div></div>
  </div>
  <div class="note"><p><strong>Use gold sparingly.</strong> It carries emphasis precisely because it is restrained. Default surfaces are always slate-family — gold and silver function as accent and hierarchy layers, never as fills.</p></div>
</body>
</html>
