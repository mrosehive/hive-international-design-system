<!-- @dsCard group="Type" viewport="700x280" name="Type Scale" subtitle="Bebas display hierarchy → DM Sans body" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:24px 32px; }
  .row { display:flex; align-items:baseline; gap:20px; padding:9px 0; border-bottom:1px solid var(--border-hairline); }
  .row:last-child { border-bottom:none; }
  .lbl { font-size:10px; letter-spacing:var(--tracking-label); text-transform:uppercase; color:var(--text-accent); width:128px; flex:0 0 auto; }
  .d { font-family:var(--font-display); color:var(--text-strong); letter-spacing:var(--tracking-display); line-height:1; }
  .b { font-family:var(--font-body); color:var(--text-body); }
</style>
</head>
<body>
  <div class="row"><span class="lbl">Display XL · 80</span><span class="d" style="font-size:52px">HIVE INTL</span></div>
  <div class="row"><span class="lbl">Section · 52</span><span class="d" style="font-size:38px">Brand System</span></div>
  <div class="row"><span class="lbl">Subhead · 28</span><span class="d" style="font-size:24px;color:var(--text-muted)">Color &amp; Typography</span></div>
  <div class="row"><span class="lbl">Lead · 17 / 300</span><span class="b" style="font-size:17px;font-weight:300">Operational advisory support</span></div>
  <div class="row"><span class="lbl">Body · 15 / 400</span><span class="b" style="font-size:15px">Field-tested expertise, delivered in high-consequence environments</span></div>
  <div class="row"><span class="lbl">Label · 11 / 600</span><span class="b" style="font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--text-accent)">Section 05 — Typography</span></div>
</body>
</html>
