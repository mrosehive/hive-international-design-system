<!-- @dsCard group="Colors" viewport="700x180" name="Primary Surfaces" subtitle="Slate-led surfaces — the brand's default field" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:24px; }
  .row { display:flex; gap:14px; }
  .sw { flex:1; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-hairline); }
  .chip { height:84px; }
  .meta { padding:10px 12px; background:var(--surface-raised); }
  .nm { font-family:var(--font-display); letter-spacing:var(--tracking-title); font-size:16px; color:var(--text-strong); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--text-accent); margin-top:2px; }
  .role { font-size:11px; color:var(--text-muted); margin-top:5px; line-height:1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#1B222A"></div><div class="meta"><div class="nm">Hive Slate</div><div class="hex">#1B222A</div><div class="role">Primary surface — the Hive background</div></div></div>
    <div class="sw"><div class="chip" style="background:#2E3A45"></div><div class="meta"><div class="nm">Charcoal</div><div class="hex">#2E3A45</div><div class="role">Cards, panels, layered dark UI</div></div></div>
    <div class="sw"><div class="chip" style="background:#141B22"></div><div class="meta"><div class="nm">Deep Slate</div><div class="hex">#141B22</div><div class="role">Footers, nav, depth layers</div></div></div>
  </div>
</body>
</html>
