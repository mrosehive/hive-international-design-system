<!-- @dsCard group="Colors" viewport="700x140" name="Semantic Status" subtitle="Low-saturation, mission-credible status colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:24px; }
  .row { display:flex; gap:14px; }
  .sw { flex:1; display:flex; align-items:center; gap:12px; background:var(--surface-raised); border-radius:var(--radius-md); padding:14px 16px; border:1px solid var(--border-hairline); }
  .dot { width:26px; height:26px; border-radius:var(--radius-pill); flex:0 0 auto; }
  .nm { font-size:13px; font-weight:var(--weight-medium); color:var(--text-strong); }
  .hex { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-top:2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><span class="dot" style="background:#4CAF50"></span><div><div class="nm">Success</div><div class="hex">#4CAF50</div></div></div>
    <div class="sw"><span class="dot" style="background:#E53935"></span><div><div class="nm">Danger</div><div class="hex">#E53935</div></div></div>
    <div class="sw"><span class="dot" style="background:#5B9BD5"></span><div><div class="nm">Info</div><div class="hex">#5B9BD5</div></div></div>
    <div class="sw"><span class="dot" style="background:#F2B632"></span><div><div class="nm">Warning</div><div class="hex">#F2B632</div></div></div>
  </div>
</body>
</html>
