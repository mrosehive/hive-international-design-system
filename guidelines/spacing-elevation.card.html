<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Subtle depth only — never glow, bevel or emboss" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:30px 32px; display:flex; gap:28px; }
  .item { text-align:center; }
  .box { width:128px; height:74px; background:var(--surface-raised); border-radius:var(--radius-md); }
  .s1 { box-shadow:var(--shadow-sm); }
  .s2 { box-shadow:var(--shadow-md); }
  .s3 { box-shadow:var(--shadow-lg); }
  .v { font-size:11px; color:var(--text-accent); margin-top:12px; font-weight:var(--weight-medium); }
  .n { font-size:10px; color:var(--text-muted); margin-top:2px; }
</style>
</head>
<body>
  <div class="item"><div class="box s1"></div><div class="v">shadow-sm</div><div class="n">resting cards</div></div>
  <div class="item"><div class="box s2"></div><div class="v">shadow-md</div><div class="n">popovers, hover</div></div>
  <div class="item"><div class="box s3"></div><div class="v">shadow-lg</div><div class="n">dialogs, overlays</div></div>
</body>
</html>
