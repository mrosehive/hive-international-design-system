<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="4px base — whitespace is the dominant field" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:26px 32px; }
  .row { display:flex; align-items:flex-end; gap:18px; }
  .item { text-align:center; }
  .bar { background:var(--hive-gold); border-radius:2px 2px 0 0; width:26px; }
  .v { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); margin-top:8px; }
  .n { font-size:10px; color:var(--text-body); margin-top:2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="v">4</div><div class="n">1</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="n">2</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="v">12</div><div class="n">3</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="n">4</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="n">6</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="n">8</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="v">48</div><div class="n">12</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="v">64</div><div class="n">16</div></div>
    <div class="item"><div class="bar" style="height:80px"></div><div class="v">80</div><div class="n">20</div></div>
  </div>
</body>
</html>
