<!-- @dsCard group="Colors" viewport="700x180" name="Accent & Neutral" subtitle="Gold emphasis, silver support, warm-white light field" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:24px; }
  .row { display:flex; gap:14px; }
  .sw { flex:1; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-hairline); }
  .chip { height:84px; }
  .meta { padding:10px 12px; background:var(--surface-raised); }
  .nm { font-family:var(--font-display); letter-spacing:var(--tracking-title); font-size:16px; color:var(--text-strong); }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--text-accent); margin-top:2px; }
  .role { font-size:11px; color:var(--text-muted); margin-top:5px; line-height:1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#F2B632"></div><div class="meta"><div class="nm">Hive Gold</div><div class="hex">#F2B632</div><div class="role">Accent + emphasis only — use sparingly</div></div></div>
    <div class="sw"><div class="chip" style="background:#B8BCC4"></div><div class="meta"><div class="nm">Silver Gray</div><div class="hex">#B8BCC4</div><div class="role">Supporting text, globe mark, dividers</div></div></div>
    <div class="sw"><div class="chip" style="background:#F5F2ED"></div><div class="meta"><div class="nm">Warm White</div><div class="hex">#F5F2ED</div><div class="role">Print / light-mode backgrounds, on-dark text</div></div></div>
  </div>
</body>
</html>
