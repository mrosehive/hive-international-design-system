<!-- @dsCard group="Brand" viewport="700x170" name="Globe Mark" subtitle="The interconnected hex-globe — Hive's core symbol" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:24px; }
  .row { display:flex; gap:14px; }
  .card { flex:1; border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-hairline); }
  .stage { min-height:96px; display:flex; align-items:center; justify-content:center; padding:18px; }
  .stage img { height:60px; }
  .lbl { padding:8px 12px; font-size:10px; color:var(--text-muted); text-align:center; background:var(--surface-raised); }
</style>
</head>
<body>
  <div class="row">
    <div class="card"><div class="stage" style="background:var(--hive-slate)"><img src="../assets/logos/globe_gold.svg" alt="Gold globe"></div><div class="lbl">Gold — on slate</div></div>
    <div class="card"><div class="stage" style="background:var(--hive-charcoal)"><img src="../assets/logos/globe_silver.svg" alt="Silver globe"></div><div class="lbl">Silver — on charcoal</div></div>
    <div class="card"><div class="stage" style="background:var(--hive-warm-white)"><img src="../assets/logos/globe_slate.svg" alt="Slate globe"></div><div class="lbl">Slate — on warm white</div></div>
  </div>
</body>
</html>
