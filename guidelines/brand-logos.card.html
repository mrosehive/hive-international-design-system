<!-- @dsCard group="Brand" viewport="700x200" name="Primary Logo Lockups" subtitle="Gold + Charcoal — the default Hive logos" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:24px; }
  .row { display:flex; gap:14px; }
  .card { flex:1; background:var(--surface-raised); border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-hairline); }
  .stage { background:var(--surface-base); min-height:120px; display:flex; align-items:center; justify-content:center; padding:24px; }
  .stage img { max-width:88%; max-height:84px; }
  .lbl { padding:10px 14px; font-size:11px; color:var(--text-muted); letter-spacing:.04em; }
  .lbl b { color:var(--text-strong); font-weight:var(--weight-medium); }
</style>
</head>
<body>
  <div class="row">
    <div class="card"><div class="stage"><img src="../assets/logos/hive_horizontal_gold_charcoal.svg" alt="Hive horizontal logo"></div><div class="lbl"><b>Horizontal</b> — headers, banners, wide formats</div></div>
    <div class="card"><div class="stage"><img src="../assets/logos/hive_stacked_gold_charcoal.svg" alt="Hive stacked logo"></div><div class="lbl"><b>Stacked</b> — square / profile / centered title</div></div>
  </div>
</body>
</html>
