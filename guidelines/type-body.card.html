<!-- @dsCard group="Type" viewport="700x230" name="Body — DM Sans" subtitle="Four weights: 300 / 400 / 500 / 600" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--surface-base); font-family:var(--font-body); padding:26px 32px; }
  p { margin:0 0 14px; line-height:1.45; }
  p:last-child { margin-bottom:0; }
  .w { font-family:var(--font-mono); font-size:10px; color:var(--text-muted, #B8BCC4); }
</style>
</head>
<body>
  <p style="font-size:17px;font-weight:300;color:var(--text-strong, #F5F2ED)">Light 300 — <span class="w">lead paragraphs &amp; executive summaries</span></p>
  <p style="font-size:15px;font-weight:400;color:var(--text-body, #E8E4DE)">Regular 400 — <span class="w">standard body copy, proposal narratives, table content</span></p>
  <p style="font-size:14px;font-weight:500;color:var(--text-muted, #B8BCC4)">Medium 500 — <span class="w">labels, subheadings, UI elements, callouts</span></p>
  <p style="font-size:13px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--text-accent, #F2B632)">SemiBold 600 — Section Tags &amp; Table Headers</p>
</body>
</html>
